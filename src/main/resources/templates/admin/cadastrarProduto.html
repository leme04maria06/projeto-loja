<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Produto</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="container-form">

        <div class="card-form">

            <h1>
                Novo Produto
            </h1>

            <form
                class="form-produto"
                action="/admin/produto/salvar"
                method="post"
                enctype="multipart/form-data">

                <div class="campo">

                    <label>Título</label>

                    <input
                        type="text"
                        name="titulo"
                        required>

                </div>

                <div class="campo">

                    <label>Descrição</label>

                    <textarea
                        name="descricao"
                        required>
                    </textarea>

                </div>

                <div class="campo">

                    <label>Preço</label>

                    <input
                        type="number"
                        step="0.01"
                        min="0"
                        name="preco"
                        required>

                </div>

                <div class="campo">

                    <label>Imagem</label>

                    <input
                        type="file"
                        name="arquivo"
                        accept="image/*"
                        required>

                </div>

                <button
                    class="btn-salvar"
                    type="submit">

                    Salvar

                </button>

            </form>

            <br>

            <a
                class="btn-cancelar"
                href="/admin/produtos">

                Cancelar

            </a>

        </div>

    </div>

</body>
</html>
