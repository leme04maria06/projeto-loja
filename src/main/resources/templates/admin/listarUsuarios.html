<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gerenciar Usuários</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="container-usuarios">

        <div class="topo-usuarios">

            <h1>
                Gerenciar Usuários
            </h1>

            <a
                class="btn-voltar"
                href="/admin">

                Voltar ao Painel

            </a>

        </div>

        <div class="tabela-container">

            <table class="tabela-usuarios">

                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Telefone</th>
                    <th>Perfil</th>
                    <th>Ações</th>
                </tr>

                <tr th:each="usuario : ${lista}">

                    <td th:text="${usuario.id}"></td>
                    <td th:text="${usuario.nome}"></td>
                    <td th:text="${usuario.email}"></td>
                    <td th:text="${usuario.telefone}"></td>
                    <td th:text="${usuario.perfil}"></td>

                    <td>

                        <a
                            class="btn-editar"
                            th:href="@{'/admin/usuario/editar/' + ${usuario.id}}">

                            Editar

                        </a>

                        <a
                            class="btn-excluir"
                            th:href="@{'/admin/usuario/excluir/' + ${usuario.id}}"
                            onclick="return confirm('Deseja realmente excluir este usuário?')">

                            Excluir

                        </a>

                    </td>

                </tr>

            </table>

        </div>

    </div>

</body>
</html>
